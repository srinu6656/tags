<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>User Registration Form</h2>

    <form action="https://example.com/register" method="post">

        <label for="firstName">First Name:</label>
        <input
            type="text"
            id="firstName"
            name="first_name"
            value="John"
            autofocus
            required>

        <label for="lastName">Last Name:</label>
        <input
            type="text"
            id="lastName"
            name="last_name"
            required>

        <label for="email">Email:</label>
        <input
            type="email"
            id="email"
            name="email"
            required>

        <label for="password">Password:</label>
        <input
            type="password"
            id="password"
            name="password"
            minlength="8"
            required>

        <div class="buttons">
            <button type="submit">
                Register
            </button>

            <button
                type="submit"
                formaction="https://example.com/save-draft">
                Save Draft
            </button>
        </div>

    </form>
</div>

</body>
</html>
