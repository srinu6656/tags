<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="tel"],
        input[type="url"],
        input[type="date"],
        input[type="datetime-local"],
        input[type="file"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .inline-group {
            margin-top: 10px;
        }

        .inline-group label {
            display: inline;
            margin-right: 15px;
            font-weight: normal;
        }

        .range-value {
            font-weight: bold;
            color: #007BFF;
        }

        .buttons {
            text-align: center;
            margin-top: 20px;
        }

        button,
        input[type="reset"] {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button {
            background-color: #28a745;
            color: white;
        }

        input[type="reset"] {
            background-color: #dc3545;
            color: white;
        }

        button:hover {
            background-color: #218838;
        }

        input[type="reset"]:hover {
            background-color: #c82333;
        }

        p.note {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>User Registration Form</h2>

    <form action="https://example.com/submit" method="post">

        <!-- Block-level elements -->
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname"
               placeholder="Enter your full name" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email"
               placeholder="Enter your email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone"
               placeholder="Enter your phone number"
               pattern="[0-9]{10}" required>

        <label for="website">Website URL</label>
        <input type="url" id="website" name="website"
               placeholder="https://example.com" required>

        <label for="birthdate">Date of Birth</label>
        <input type="date" id="birthdate" name="birthdate" required>

        <label for="appointment">Preferred Appointment</label>
        <input type="datetime-local" id="appointment"
               name="appointment" required>

        <label for="resume">Upload Resume</label>
        <input type="file" id="resume" name="resume" required>

        <!-- Inline elements -->
        <div class="inline-group">
            <p><strong>Gender:</strong></p>
            <label>
                <input type="radio" name="gender" value="Male" required>
                Male
            </label>

            <label>
                <input type="radio" name="gender" value="Female">
                Female
            </label>

            <label>
                <input type="radio" name="gender" value="Other">
                Other
            </label>
        </div>

        <div class="inline-group">
            <p><strong>Interests:</strong></p>
            <label>
                <input type="checkbox" name="interest" value="Technology">
                Technology
            </label>

                <input type="checkbox" name="interest" value="
